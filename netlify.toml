# ==========================================
# NETLIFY CONFIGURATION
# ==========================================

[build]
  publish = "/"

# Bloquear archivos de plantilla/desarrollo que aún no están a la venta
# (index.html y script.js SÍ deben seguir públicos: ya están vendidos)
[[redirects]]
  from = "/dev.html"
  to = "/"
  status = 404
  force = true

[[redirects]]
  from = "/produccion.html"
  to = "/"
  status = 404
  force = true

# Headers de seguridad y caché
[[headers]]
  for = "/*"
  
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    X-XSS-Protection = "1; mode=block"

# Caché para imágenes
[[headers]]
  for = "/img/*"
  
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Caché para assets
[[headers]]
  for = "/assets/*"
  
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Caché para archivos estáticos
[[headers]]
  for = "/*.css"
  
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"